<!DOCTYPE html>
<html>
<head>
    <title>BATTLE #1</title>

    <style>
        body {
            background-color: lightgrey;
            margin: 0;
            min-height: 50vh;

            /* Center content */
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            max-width: 1000px;
            padding: 30px;
        }

        .pokemon-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pokemon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pokemon-card img {
            width: 120px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #ffcc00;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: orange;
            transform: scale(1.05);
        }

        .rules {
            margin-top: 50px;
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            text-align: left;
        }

        .rules h2 {
            text-align: center;
        }

        .rules p {
            line-height: 1.6;
        }
    </style>
</head>

<body>

<!-- Battle Music -->
    <audio autoplay>
        <source src="audio/battle.mp3" type="audio/mpeg">
    </audio>

    <div class="container">

        <h1>A WILD BULBASAUR AND CHARMANDER APPEARED!!</h1>
        <p>Choose which Pokemon Squirtle should use 'Water Gun' on.</p>

        <div class="pokemon-row">

            <div class="pokemon-card">
                <img src="images/bulbasaur.png" alt="Bulbasaur">

		<a href="hypertext4.html">
                    <button>Bulbasaur</button>
		</a>
            </div>

            <div class="pokemon-card">
                <img src="images/charmander.png" alt="Charmander">

		<a href="hypertext10.html">
                    <button>Charmander</button>
		</a>
            </div>

        </div>
       

    </div>

</body>
</html>
