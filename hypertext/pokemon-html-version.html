<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Hypertext Version</title>

    <style>
        body {
            background-color: lightgrey;
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            text-align: center;
            font-family: Impact, Arial Black, sans-serif;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 60px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        img {
            width: 300px;
            margin-bottom: 40px;
        }

        button {
            padding: 15px 35px;
            border: none;
            background-color: #ffcc00;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            font-family: Impact, Arial Black, sans-serif;
            transition: 0.3s;
        }

        button:hover {
            background-color: orange;
            transform: scale(1.08);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Pokemon Hypertext Version</h1>

        <!-- Pokeball Image -->
        <img src="images/pokeball.png" alt="Pokeball">

        <br>

        <!-- Begin Button -->
        <a href="hypertext.html">
            <button>Click to Begin</button>
        </a>

    </div>

</body>
</html>
