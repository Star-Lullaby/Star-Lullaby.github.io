<!DOCTYPE html>
<html>
<head>
    <title>IT WASN'T VERY EFFECTIVE...</title>

    <style>
        body {
            background-color: lightgrey;
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            padding: 30px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .fainted img {
            width: 250px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 25px;
            border: none;
            background-color: #ffcc00;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: orange;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- Defeat Music -->
    <audio autoplay>
        <source src="audio/failure.mp3" type="audio/mpeg">
    </audio>

    <div class="container">

        <h1>IT WASN'T VERY EFFECTIVE...</h1>

        <p>
            The opposing Pokémon used a super effective attack
            and your Pokémon fainted.
        </p>

        <!-- Fainted Image -->
        <div class="fainted">
            <img src="images/fainted.png" alt="Fainted Pokemon">
        </div>

        <!-- Restart Button -->
        <a href="hypertext.html">
            <button>Restart</button>
        </a>

    </div>

</body>
</html>
