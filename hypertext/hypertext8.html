<!DOCTYPE html>
<html>
<head>
    <title>POKEMON MASTER!</title>

    <style>
        body {
            background-color: lightgrey;
            margin: 0;
            min-height: 50vh;

            display: flex;
            justify-content: center;
            align-items: center;

            text-align: center;
            font-family: Impact, Arial Black, sans-serif;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.6;
            max-width: 900px;
            margin: auto;
            margin-bottom: 30px;
        }

        img {
            width: 425px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 35px;
            border: none;
            background-color: #ffcc00;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            font-family: Impact, Arial Black, sans-serif;
            transition: 0.3s;
        }

        button:hover {
            background-color: orange;
            transform: scale(1.08);
        }
    </style>
</head>

<body>

    <!-- Victory Music -->
    <audio autoplay>
        <source src="audio/victory.mp3" type="audio/mpeg">
    </audio>

    <div class="container">

        <h1>CONGRATULATIONS!</h1>

        <p>
            You leveled up your Pokemon to their maximum potential.
            You are now a Pokemon Master!
        </p>

        <!-- Master Image -->
        <img src="images/master.png" alt="Pokemon Master">

        <br>

        <!-- Restart Journey Button -->
        <a href="hypertext.html">
            <button>Start New Journey</button>
        </a>

    </div>

</body>
</html>
